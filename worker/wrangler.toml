name = "vistalux-worker"
main = "src/index.ts"
compatibility_date = "2024-05-29"
compatibility_flags = ["nodejs_compat"]

# Queue bindings
[[queues.producers]]
queue = "itinerary-queue"
binding = "ITINERARY_QUEUE"

[[queues.producers]]
queue = "scrapbook-queue"
binding = "SCRAPBOOK_QUEUE"

[[queues.producers]]
queue = "offline-bundle-queue"
binding = "OFFLINE_BUNDLE_QUEUE"

[[queues.producers]]
queue = "alerts-queue"
binding = "ALERTS_QUEUE"

[[queues.consumers]]
queue = "itinerary-queue"
max_batch_size = 10
max_batch_timeout = 30

[[queues.consumers]]
queue = "scrapbook-queue"
max_batch_size = 5
max_batch_timeout = 30

[[queues.consumers]]
queue = "offline-bundle-queue"
max_batch_size = 5
max_batch_timeout = 30

[[queues.consumers]]
queue = "alerts-queue"
max_batch_size = 20
max_batch_timeout = 10

# R2 bucket binding
[[r2_buckets]]
binding = "ASSETS_BUCKET"
bucket_name = "vistalux-assets"

[vars]
ENVIRONMENT = "development"

# Secrets (set via: wrangler secret put <NAME>)
# DATABASE_URL
# UPSTASH_REDIS_REST_URL
# UPSTASH_REDIS_REST_TOKEN
# JWT_SECRET
# GOOGLE_PLACES_API_KEY
# TOMORROW_IO_API_KEY
# OPEN_EXCHANGE_RATES_API_KEY
# SENTRY_DSN
# RESEND_API_KEY
